site_name: DevSecurity
site_description: Coleção de livros técnicos de desenvolvimento de software seguro em português
site_author: DevSecurity
site_url: https://username.github.io/DevSecurity
repo_name: DevSecurity
repo_url: https://github.com/username/DevSecurity
edit_uri: edit/main/docs/
copyright: 'CC BY-NC-SA 4.0 — Compartilhe, adapte, cite a fonte. Uso comercial requer autorização.'

theme:
  name: material
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - toc.integrate

