markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - codehilite:
      guess_lang: false
      linenums: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - attr_list
  - md_in_html
  - footnotes
  - def_list
  - abbr
  - tables

plugins:
  - search:
      lang: pt
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b\d{4}\b)\b\d+\b'
  - git-revision-date-localized:
      type: date
      locale: pt
      fallback_to_build_date: true
  - git-committers:
      repository: username/DevSecurity
      branch: main
  - minify:
      minify_html: true
  - redirects:
      redirect_maps:
        'book/INDICE.md': 'book/00-prefacio.md'
        'devsecops/INDICE.md': 'devsecops/00-prefacio.md'
        'malware/INDICE.md': 'malware/00-prefacio.md'
        'concurrency/INDICE.md': 'concurrency/00-prefacio.md'
        'cryptography/INDICE.md': 'cryptography/00-prefacio.md'
        'web/INDICE.md': 'web/00-prefacio.md'

